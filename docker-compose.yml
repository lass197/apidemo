services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sghl
      POSTGRES_USER: sghl
      POSTGRES_PASSWORD: sghl
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sghl"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - backend/.env.docker
    environment:
      DB_ENGINE: postgresql
      DB_HOST: db
      DB_NAME: sghl
      DB_USER: sghl
      DB_PASSWORD: sghl
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media:/app/backend/media

volumes:
  pgdata:
  media:
