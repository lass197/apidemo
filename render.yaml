# Blueprint Render — SGHL (free tier + sous-domaine *.onrender.com)
# Dashboard : New → Blueprint → connecter le dépôt GitHub

services:
  - type: web
    name: sghl-web
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/docs
    preDeployCommand: python manage.py migrate --noinput
    initialDeployHook: python manage.py seed_sghl
    envVars:
      - key: DEBUG
        value: "False"
      # Render termine déjà le TLS ; éviter les boucles sur les health checks HTTP
      - key: SECURE_SSL_REDIRECT
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      # Générer : python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      - key: FIELD_ENCRYPTION_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DATABASE_URL
        fromDatabase:
          name: sghl-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sghl-redis
          property: connectionString
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

  - type: keyvalue
    name: sghl-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: sghl-db
    plan: free
    databaseName: sghl
    user: sghl
    ipAllowList: []
