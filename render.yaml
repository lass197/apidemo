# Blueprint Render — SGHL (free tier + sous-domaine *.onrender.com)
#
# Sur free tier, le hostname Postgres interne (dpg-...) échoue souvent
# ("Name or service not known"). On utilise SQLite + seed pour la démo.

services:
  - type: web
    name: sghl-web
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/sante/
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECURE_SSL_REDIRECT
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: FIELD_ENCRYPTION_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: SEED_ON_BOOT
        value: "true"
      # Contourne l'erreur DNS Postgres interne sur free tier
      - key: USE_SQLITE
        value: "true"
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

databases:
  - name: sghl-db
    plan: free
    region: frankfurt
    databaseName: sghl
    user: sghl
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
